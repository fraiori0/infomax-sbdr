# without stop gradient, only loss is loo_infonce between a_neutral and z, predictive (time step offset)
[model]
type = "GateEncoder"
seed = 45
[model.kwargs]
pre_features = [256, 256]
features = 256
pre_activation_fn = "leaky_relu"
   
[dataset]
[dataset.transform.specaugment.kwargs]
n_time_masks = 7
max_time_width = 2 # over 98 steps, with standard Mel-Spectrogram params on GSC dataset
n_freq_masks = 2
max_freq_width = 2

[training]
epochs = 150
batch_size = 256

[training.checkpoint]
save = true
save_interval = 2 # epochs
max_to_keep = 12

[training.dataloader]
shuffle = true
# drop the last batch to avoid recompiling jitted functions because of changing input dims
# see here https://flax-linen.readthedocs.io/en/latest/guides/data_preprocessing/full_eval.html
drop_last = true

[training.loss]
eps = 1e-2
w_eps = 1.0e-1
class_steps = 60
n_classes = 35

[training.optimizer]
type = "adamw"
[training.optimizer.kwargs]
learning_rate = 0.001
weight_decay = 0.00001

[validation]
split = 0.16
eval_interval = 12
[validation.dataloader]
batch_size = 372
[validation.sim_fn]
type = "log_and"
quantile = 0.9
[validation.sim_fn.kwargs]
eps = 1.0e-2


