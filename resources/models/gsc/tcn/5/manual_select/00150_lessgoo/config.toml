[model]
type = "TCNPoolClassifier"
seed = 46
p_target = 0.01
[model.kwargs]
features = [256, 256, 256]
kernel_sizes = [3, 3, 3]
kernel_strides = [1, 1, 1]
pool_sizes = [3, 3, 3]
pool_strides = [2, 2, 2]
class_features = 35 # number of classes
stop_grad = false
stop_grad_class = false
binarize = true

[dataset]
[dataset.transform.specaugment.kwargs]
n_time_masks = 2
max_time_width = 5 # over 98 steps, with standard Mel-Spectrogram params on GSC dataset
n_freq_masks = 2
max_freq_width = 2

[training]
epochs = 150
batch_size = 256
num_classes = 35

[training.checkpoint]
save = true
save_interval = 2 # epochs
max_to_keep = 12

[training.dataloader]
shuffle = true
# drop the last batch to avoid recompiling jitted functions because of changing input dims
# see here https://flax-linen.readthedocs.io/en/latest/guides/data_preprocessing/full_eval.html
drop_last = true

[training.loss]
eps = 1.0e-1
w_eps = 1.0e-2
class_steps = 50

[training.optimizer]
type = "adamw"
[training.optimizer.kwargs]
learning_rate = 0.0001
weight_decay = 0.000001
# momentum=0.9
# nesterov=true

[validation]
split = 0.16
eval_interval = 12
[validation.dataloader]
batch_size = 256
[validation.sim_fn]
type = "log_and"
quantile = 0.9
[validation.sim_fn.kwargs]
eps = 1.0e-2


